<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MPHelper</title>
    <link rel="stylesheet" href="mphelper-lite.css">
</head>
<body>
    <main class="container stack">
        <header class="app-header">
            <div class="app-header-copy stack gap-1">
                <p class="eyebrow">Vendoroo Marketplace Helper</p>
                <h1>MPHelper <small id="appVersion" class="version-tag" title="MPHelper version"></small></h1>
            </div>
            <button id="openDialogButton" class="primary app-header-action" type="button">Open</button>
        </header>

        <section class="panel stack" aria-label="Settings">
            <div class="shortcut-section">
                <span id="shortcutLabel" class="setting-title">Shortcut</span>
                <div class="shortcut-builder" aria-labelledby="shortcutLabel">
                    <select id="modifierOneSelect" aria-label="First modifier key">
                        <option value="">None</option>
                        <option value="Ctrl">Ctrl</option>
                        <option value="Alt">Alt</option>
                        <option value="Shift">Shift</option>
                        <option value="Meta">Meta</option>
                    </select>
                    <select id="modifierTwoSelect" aria-label="Second modifier key">
                        <option value="">None</option>
                        <option value="Ctrl">Ctrl</option>
                        <option value="Alt">Alt</option>
                        <option value="Shift">Shift</option>
                        <option value="Meta">Meta</option>
                    </select>
                    <button
                        id="recordShortcutButton"
                        class="secondary final-key"
                        type="button"
                        aria-label="Final key"
                    >
                        M
                    </button>
                    <button
                        id="resetShortcutButton"
                        class="secondary icon-btn"
                        type="button"
                        aria-label="Reset shortcut"
                        title="Reset shortcut"
                    >
                        <svg class="icon-btn-glyph" aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.93 7.93 0 0 0 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74A7.93 7.93 0 0 0 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="setting-row">
                <label id="imageAnalysisLabel" class="setting-title">Image Analysis Copy</label>
                <button
                    id="imageAnalysisToggle"
                    class="switch"
                    type="button"
                    role="switch"
                    aria-labelledby="imageAnalysisLabel"
                    aria-checked="false"
                >
                    Off
                </button>
            </div>

            <div class="setting-block">
                <div class="field">
                    <label id="timelineTimestampsLabel" class="setting-title">Timeline Timestamps</label>
                    <div
                        id="timelineModeGroup"
                        class="choice-group choice-group--stretch"
                        role="radiogroup"
                        aria-labelledby="timelineTimestampsLabel"
                    >
                    <button
                        type="button"
                        class="choice-btn"
                        data-timeline-mode="off"
                        role="radio"
                        aria-checked="false"
                    >
                        Off
                    </button>
                    <button
                        type="button"
                        class="choice-btn"
                        data-timeline-mode="local"
                        role="radio"
                        aria-checked="false"
                    >
                        Local
                    </button>
                    <button
                        type="button"
                        class="choice-btn"
                        data-timeline-mode="client"
                        role="radio"
                        aria-checked="false"
                    >
                        Client
                    </button>
                    <button
                        type="button"
                        class="choice-btn"
                        data-timeline-mode="utc"
                        role="radio"
                        aria-checked="false"
                    >
                        UTC
                    </button>
                    </div>
                </div>
            </div>
        </section>

        <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>

    <script src="popup.js"></script>
</body>
</html>
