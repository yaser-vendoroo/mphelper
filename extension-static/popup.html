<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MPHelper</title>
    <link rel="stylesheet" href="mphelper-lite.css">
</head>
<body>
    <main class="container stack">
        <header class="app-header">
            <div class="app-header-copy stack gap-1">
                <p class="eyebrow">Vendoroo Marketplace Helper</p>
                <h1>MPHelper <small id="appVersion" class="version-tag" title="MPHelper version"></small></h1>
            </div>
            <button id="openDialogButton" class="primary app-header-action" type="button">Open</button>
        </header>

        <section class="panel stack" aria-label="Settings">
            <div class="field">
                <label for="shortcutValue" class="setting-title">Current Shortcut</label>
                <output id="shortcutValue" class="kbd" for="recordShortcutButton">Loading...</output>
            </div>

            <div class="shortcut-builder" aria-label="Shortcut editor">
                <div class="field">
                    <label for="modifierOneSelect" class="setting-title">First Key</label>
                    <select id="modifierOneSelect">
                        <option value="">None</option>
                        <option value="Ctrl">Ctrl</option>
                        <option value="Alt">Alt</option>
                        <option value="Shift">Shift</option>
                        <option value="Meta">Meta</option>
                    </select>
                </div>

                <div class="field">
                    <label for="modifierTwoSelect" class="setting-title">Second Key</label>
                    <select id="modifierTwoSelect">
                        <option value="">None</option>
                        <option value="Ctrl">Ctrl</option>
                        <option value="Alt">Alt</option>
                        <option value="Shift">Shift</option>
                        <option value="Meta">Meta</option>
                    </select>
                </div>

                <div class="field">
                    <label for="recordShortcutButton" class="setting-title">Final Key</label>
                    <button id="recordShortcutButton" class="secondary final-key" type="button">M</button>
                </div>
            </div>

            <div class="cluster">
                <button id="resetShortcutButton" class="secondary" type="button">Reset</button>
            </div>

            <div class="setting-row">
                <label id="imageAnalysisLabel" class="setting-title">Image Analysis Copy</label>
                <button
                    id="imageAnalysisToggle"
                    class="switch"
                    type="button"
                    role="switch"
                    aria-labelledby="imageAnalysisLabel"
                    aria-checked="false"
                >
                    Off
                </button>
            </div>

            <div class="setting-block">
                <div class="field">
                    <label id="timelineTimestampsLabel" class="setting-title">Timeline Timestamps</label>
                    <div
                        id="timelineModeGroup"
                        class="choice-group choice-group--stretch"
                        role="radiogroup"
                        aria-labelledby="timelineTimestampsLabel"
                    >
                    <button
                        type="button"
                        class="choice-btn"
                        data-timeline-mode="off"
                        role="radio"
                        aria-checked="false"
                    >
                        Off
                    </button>
                    <button
                        type="button"
                        class="choice-btn"
                        data-timeline-mode="local"
                        role="radio"
                        aria-checked="false"
                    >
                        Local
                    </button>
                    <button
                        type="button"
                        class="choice-btn"
                        data-timeline-mode="client"
                        role="radio"
                        aria-checked="false"
                    >
                        Client
                    </button>
                    <button
                        type="button"
                        class="choice-btn"
                        data-timeline-mode="utc"
                        role="radio"
                        aria-checked="false"
                    >
                        UTC
                    </button>
                    </div>
                </div>
            </div>
        </section>

        <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>

    <script src="popup.js"></script>
</body>
</html>
